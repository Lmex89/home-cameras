cameras:
  - name: "Example Camera 1"
    host: "192.168.1.100"
    port: 80
    username: "admin"
    password: "your_password_here"
    profile_token: null
    interval_minutes: 1
    enabled: true

  - name: "Example Camera 2"
    host: "192.168.1.101"
    port: 8899
    username: "admin"
    password: "your_password_here"
    profile_token: null
    interval_minutes: 30
    enabled: true

  - name: "Camera with direct URL"
    host: "192.168.1.102"
    port: 80
    username: "admin"
    password: "secret"
    snapshot_url: "http://192.168.1.102/cgi-bin/snapshot.cgi"
    interval_minutes: 5
    enabled: true
