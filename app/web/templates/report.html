{% extends "base.html" %}
{% block title %}Reporte Diario - Camera Monitor{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-calendar-week"></i> Reporte Diario</h2>

<div class="row mb-4">
    <div class="col-md-4">
        <div class="input-group">
            <span class="input-group-text"><i class="bi bi-calendar"></i></span>
            <input type="date" class="form-control" id="reportDate" value="{{ today }}">
        </div>
    </div>
    <div class="col-md-2">
        <button class="btn btn-primary w-100" id="btnLoadReport">
            <i class="bi bi-search"></i> Cargar
        </button>
    </div>
</div>

<div id="report-alerts"></div>

<div id="reportContent">
    <div class="text-center text-muted py-5">
        <i class="bi bi-file-earmark-text" style="font-size: 4rem;"></i>
        <p class="mt-3">Selecciona una fecha para ver el reporte</p>
    </div>
</div>

<div class="modal fade" id="reportSnapshotModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content bg-dark">
            <div class="modal-header">
                <h5 class="modal-title">Captura</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <img id="reportSnapshotImage" src="" class="img-fluid" alt="Captura">
            </div>
        </div>
    </div>
</div>
{% endblock %}
